[helpers]

[default]
depends = []

[default.files]
"config/dotfiles" = "~/.config/dotfiles"
"config/atuin" = "~/.config/atuin"
"config/kitty" = "~/.config/kitty"
"config/mpv" = "~/.config/mpv"
"config/niri" = "~/.config/niri"
"config/nushell" = "~/.config/nushell"
"config/nvim" = "~/.config/nvim"
"config/uwsm" = "~/.config/uwsm"
"config/wireplumber" = "~/.config/wireplumber"
"config/xdg-desktop-portal" = "~/.config/xdg-desktop-portal"
"config/quickshell" = "~/.config/quickshell"

"config/electron-flags.conf" = "~/.config/electron-flags.conf"
"config/logid.cfg" = { target = "/etc/logid.cfg", type = "symbolic", owner = "root" }
"config/mimeapps.list" = "~/.config/mimeapps.list"
"config/user-dirs.dirs" = "~/.config/user-dirs.dirs"

"applications" = "~/.local/share/applications/"
"autostart" = "~/.config/autostart"

[host-pc.files]
"hosts/pc/niri-output.kdl" = "~/.config/niri/output.kdl"
"hosts/pc/uwsm-gpu-env" = "~/.config/uwsm/env.d/gpu"

[host-mac.files]
"hosts/mac/niri-output.kdl" = "~/.config/niri/output.kdl"
"hosts/mac/uwsm-gpu-env" = "~/.config/uwsm/env.d/gpu"

# To add another machine: duplicate a host block above as [host-<name>.files]
# and create hosts/<name>/ with the two files.

[default.variables]

[settings]
default_target_type = "automatic"
