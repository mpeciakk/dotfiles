[helpers]

[default]
depends = []

[default.files]
"config/dotfiles" = "~/.config/dotfiles"
"config/atuin" = "~/.config/atuin"
"config/kitty" = "~/.config/kitty"
"config/Kvantum" = "~/.config/Kvantum"
"config/mpv" = "~/.config/mpv"
"config/niri" = "~/.config/niri"
"config/nushell" = "~/.config/nushell"
"config/nvim" = "~/.config/nvim"
"config/uwsm" = "~/.config/uwsm"
"config/wireplumber" = "~/.config/wireplumber"
"config/xdg-desktop-portal" = "~/.config/xdg-desktop-portal"
"config/quickshell" = "~/.config/quickshell"

"config/electron-flags.conf" = "~/.config/electron-flags.conf"
"config/gamemode.ini" = "~/.config/gamemode.ini"
"config/logid.cfg" = { target = "/etc/logid.cfg", type = "symbolic", owner = "root" }
"config/mimeapps.list" = "~/.config/mimeapps.list"
"config/user-dirs.dirs" = "~/.config/user-dirs.dirs"

"applications" = "~/.local/share/applications/"
"autostart" = "~/.config/autostart"

# Per-host hardware (monitors + GPU env). Each machine selects its own
# host-<name> package in .dotter/local.toml (which is gitignored). See README.
[host-ciek.files]
"hosts/ciek/niri-output.kdl" = "~/.config/niri/output.kdl"
"hosts/ciek/uwsm-gpu-env" = "~/.config/uwsm/env.d/gpu"

# Template for a second machine — copy hosts/_template -> hosts/<name>, fill it
# in, duplicate this block as [host-<name>.files], and select it in local.toml:
# [host-NAME.files]
# "hosts/NAME/niri-output.kdl" = "~/.config/niri/output.kdl"
# "hosts/NAME/uwsm-gpu-env" = "~/.config/uwsm/env.d/gpu"

[default.variables]

[settings]
default_target_type = "automatic"
