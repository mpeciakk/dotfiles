source = ~/.config/hypr/colors.conf

monitor=DP-2,3840x2160@144,0x0,1.5
monitor=HDMI-A-4,1920x1080@144,2560x0,1

$terminal = kitty
$menu = rofi -show drun -modi drun -fixed-num-lines false
$calc = rofi -show calc -modi calc -no-sort -no-show-match -lines 0 -no-history -calc-command "echo '{result}' | wl-copy" -theme-str 'listview {lines: 0;}' -hint-result " = " -hint-welcome " = " -theme calc
$screenshot = hyprshot -m region --clipboard-only

exec-once = waybar
exec-once = keyd-application-mapper
exec-once = swaync
exec-once = hyprpaper
exec-once = pypr

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DISABLE_RDD_SANDBOX,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = $gaps_in
    gaps_out = $gaps_out

    border_size = 0
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
}

opengl {
    nvidia_anti_flicker = 0
}

decoration {
    rounding = $radius_outer
    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = false
    }

    blur {
        enabled = $blur_enabled
        size = 6
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.85, 0.03, 0.97
    bezier = winIn, 0.07, 0.88, 0.04, 0.99
    bezier = winOut, 0.20, -0.15, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = md3_standard, 0.12, 0, 0, 1
    bezier = md3_decel, 0.05, 0.80, 0.10, 0.97
    bezier = md3_accel, 0.20, 0, 0.80, 0.08
    bezier = overshot, 0.05, 0.85, 0.07, 1.04
    bezier = crazyshot, 0.1, 1.22, 0.68, 0.98
    bezier = hyprnostretch, 0.05, 0.82, 0.03, 0.94
    bezier = menu_decel, 0.05, 0.82, 0, 1
    bezier = menu_accel, 0.20, 0, 0.82, 0.10
    bezier = easeInOutCirc, 0.75, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.48, 0.38, 1
    bezier = easeOutExpo, 0.10, 0.94, 0.23, 0.98
    bezier = softAcDecel, 0.20, 0.20, 0.15, 1
    bezier = md2, 0.30, 0, 0.15, 1

    bezier = OutBack, 0.28, 1.40, 0.58, 1
    bezier = easeInOutCirc, 0.78, 0, 0.15, 1

    animation = border, 1, 1.6, liner
    animation = borderangle, 1, 82, liner, loop
    animation = windowsIn, 1, 3.2, winIn, slide
    animation = windowsOut, 1, 2.8, easeOutCirc
    animation = windowsMove, 1, 3.0, wind, slide
    animation = fade, 1, 1.8, md3_decel
    animation = layersIn, 1, 1.8, menu_decel, slide
    animation = layersOut, 1, 1.5, menu_accel
    animation = fadeLayersIn, 1, 1.6, menu_decel
    animation = fadeLayersOut, 1, 1.8, menu_accel
    animation = workspaces, 1, 4.0, menu_decel, slide
    animation = specialWorkspace, 1, 2.3, md3_decel, slidefadevert 15%
}

xwayland {
  force_zero_scaling = true
  enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

input {
    kb_layout = pl

    follow_mouse = 1
    accel_profile = flat
    force_no_accel = 1
    sensitivity = 0
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$secondaryMod = ALT

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, B, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, D, exec, $calc
bind = $mainMod SHIFT, E, exec, $screenshot

bind = $mainMod, grave, cyclenext
bind = $mainMod, grave, bringactivetotop

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, Return, exec, kitten quick-access-terminal

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = suppressevent maximize, class:.*

windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrule = float,class:^RAIL,xwayland:1

windowrule = float,title:.*Minecraft.*

windowrulev2 = workspace 1, class:^(zen.*)$
windowrulev2 = workspace 2, class:^(jetbrains-idea.*)$
windowrulev2 = workspace 2, class:^(Cursor)$
windowrulev2 = workspace 3, class:^(vesktop)$
windowrulev2 = workspace 3, class:^(cider)$

windowrule = noinitialfocus,class:^(.*jetbrains.*)$,title:^(win[0-9]+)$

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:HDMI-A-4

layerrule = blur,rofi
layerrule = ignorezero,rofi
layerrule = blur,notifications
layerrule = ignorezero,notifications
layerrule = blur,swaync-notification-window
layerrule = ignorezero,swaync-notification-window
layerrule = blur,swaync-control-center
layerrule = ignorezero,swaync-control-center
layerrule = blur, ghostty-quick-terminal
layerrule = animation slidefadevert, ghostty-quick-terminal
