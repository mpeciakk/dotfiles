monitor.alsa.rules = [
  {
    matches = [
      {
        "device.name" = "alsa_card.usb-SteelSeries_Arctis_Nova_7-00"
      }
    ]
    actions = {
      update-props = {
        # 1. Force the Stable Profile (Fixes "Microphone" port issue)
        "device.profile" = "output:analog-stereo"

        # 2. Fix Crackling (Buffer Settings)
        "api.alsa.period-size" = 1024
        "api.alsa.headroom" = 1024

        # 3. Prevent Sleep (Stops profile resetting)
        "session.suspend-timeout-seconds" = 0

        # 4. Priority (Ensures it stays default)
        "priority.driver" = 2005
        "priority.session" = 2005
      }
    }
  }
]
