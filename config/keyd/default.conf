# System key remapper (keyd) — turns Super+<key> into the matching Ctrl shortcut
# at the evdev layer, before niri/apps see it. Replaces the fragile niri `wtype`
# binds (timing/focus dependent). Copy/paste use Ctrl/Shift+Insert so they work in
# terminals (where Ctrl+C stays SIGINT) as well as GUI apps and the browser.
# Unmapped Super combos (Super+1, Super+Space, Super+arrows, …) pass through to niri.

[ids]
*

[meta]
c = C-insert
v = S-insert
x = C-x
s = C-s
a = C-a
f = C-f
z = C-z
t = C-t
w = C-w
n = C-n
r = C-r

[meta+shift]
z = C-S-z
