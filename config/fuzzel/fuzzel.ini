[main]
font=SF Pro Text:size=14
dpi-aware=auto
icon-theme=MacTahoe-Icons
icons-enabled=yes

width=40
lines=8
horizontal-pad=40
vertical-pad=20
inner-pad=20

image-size-ratio=0.5
line-height=32
letter-spacing=0

layer=overlay
exit-on-keyboard-focus-loss=yes

[border]
width=2
radius=20

[colors]
background=F5F5F540
text=000000FF
match=007AFFFF
selection=007AFFFF
selection-text=FFFFFFFF
selection-match=FFFFFFFF
border=FFFFFF60

[dmenu]
mode=text
exit-immediately-if-empty=yes
