[main]
font=SF Pro Display:size=14
icon-theme=WhiteSur
fields=name,generic,comment,categories,filename,keywords
terminal=kitty
anchor=center
lines=8
width=40
horizontal-pad=20
vertical-pad=20
inner-pad=10
dpi-aware=auto

image-size-ratio=0.5
line-height=32
letter-spacing=0

layer=overlay
exit-on-keyboard-focus-loss=yes


[colors]
background=dddddd90
text=000000ff
placeholder=000000ff
input=000000ff
prompt=000000ff
match=007affff
selection=e5e5e590
selection-text=000000ff

[border]
width=0
radius=12
